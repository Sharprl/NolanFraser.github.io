<main>
  <section class="page-header">
    <h1>Contact <span>Me</span></h1>
    <p>Connect with me for cybersecurity internship and entry-level opportunities.</p>
  </section>

  <section class="contact-layout">
    <div class="profile-photo-card">
      <div class="profile-photo-frame">
        <img src="./assets/profile.jpg" alt="Portrait of Nolan Fraser" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';" />
        <div class="profile-photo-placeholder">NF</div>
      </div>
      <p>Cybersecurity student seeking internship and entry-level opportunities.</p>
    </div>

    <div class="contact-stack">
      <form class="contact-form" action="mailto:nono2002.nf@gmail.com" method="post" enctype="text/plain">
        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" name="Name" type="text" autocomplete="name" required />
        </div>

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="Email" type="email" autocomplete="email" required />
        </div>

        <div class="form-row">
          <label for="subject">Subject</label>
          <input id="subject" name="Subject" type="text" required />
        </div>

        <div class="form-row">
          <label for="message">Message</label>
          <textarea id="message" name="Message" rows="6" required></textarea>
        </div>

        <button class="btn btn-primary" type="submit">Send Message</button>
      </form>

      <div class="contact-box">
        <a class="contact-icon-link" href="https://github.com/Sharprl" aria-label="GitHub profile">
          <svg viewBox="0 0 24 24" aria-hidden="true">

          </svg>
        </a>
        <a class="contact-icon-link" href="./resume.html" aria-label="Resume page">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 2h7l5 5v15H7a2 2 0 0 1-2-2V4c0-1.1.9-2 2-2Zm6 1.8V8h4.2L13 3.8ZM8 12h8v-1.6H8V12Zm0 3.4h8v-1.6H8v1.6Zm0 3.4h5v-1.6H8v1.6Z" />

        <a class="contact-icon-link linkedin-icon" href="https://www.linkedin.com/in/nolan-fraser-366a48212/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
